    <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.net.min.js"></script>
    <script type="module" crossorigin src="/assets/index-B1GbyuLX.js"></script>

  </head>

  <body>
    <div id="root"></div>
    
    <script>
      // Initialize Vanta.js background when DOM is loaded
      document.addEventListener('DOMContentLoaded', function() {
        // Wait for Vanta to be available
        if (typeof VANTA !== 'undefined') {
          setTimeout(() => {
            const vantaElement = document.getElementById('vanta-background');
            if (vantaElement) {
              VANTA.NET({
                el: "#vanta-background",
                color: 0x3b82f6,
                backgroundColor: 0x0f172a,
                points: 10,
                maxDistance: 22,
                spacing: 16,
                showDots: false
              });
            }
          }, 100);
        }
      });
    </script>
  </body>
