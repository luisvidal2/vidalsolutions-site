<script>
(function(){
  function revealNow(el){
    el.classList.add('scroll-reveal-visible');
    el.classList.add('card-motion-visible');
  }
  function initMotion(){
    var fadeItems=document.querySelectorAll('.animate-fade-in');
    fadeItems.forEach(function(el){if(!el.closest('#hero'))el.classList.add('scroll-reveal')});

    var projectCards=document.querySelectorAll('#projects .card-hover, section[id="projects"] .card-hover');
    projectCards.forEach(function(card){card.classList.add('project-card-motion','scroll-reveal')});

    var targets=document.querySelectorAll('.scroll-reveal,.project-card-motion');
    if(!targets.length)return false;

    if(!('IntersectionObserver'in window)){targets.forEach(revealNow);return true}
    var io=new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if(entry.isIntersecting){revealNow(entry.target);io.unobserve(entry.target)}
      })
    },{threshold:.08,rootMargin:'0px 0px -4% 0px'});
    targets.forEach(function(el){
      if(el.dataset.motionObserved)return;
      el.dataset.motionObserved='1';
      io.observe(el);
    });
    return true;
  }
  function boot(){
    var tries=0;
    function attempt(){
      tries++;
      initMotion();
      if(tries<12)setTimeout(attempt,250);
    }
    attempt();
    if('MutationObserver'in window){
      var mo=new MutationObserver(function(){initMotion()});
      mo.observe(document.body,{childList:true,subtree:true});
      setTimeout(function(){mo.disconnect()},8000);
    }
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);else boot();
  window.addEventListener('load',boot);
})();
</script>

  const source=new Map();
  Object.keys(dict.es).forEach(k=>source.set(dict.es[k],k));
  Object.keys(dict.ja).forEach(k=>source.set(dict.ja[k],k));
  let lang=localStorage.getItem('vidal-lang')||'es';
  let busy=false;
  function baseText(text){return source.get(text)||text}
  function translateText(text){const base=baseText(text.trim()); if(!base)return text; const pack=dict[lang]||{}; return pack[base]||base;}
  function walk(root){
    if(busy)return; busy=true;
    try{
      const walker=document.createTreeWalker(root||document.body,NodeFilter.SHOW_TEXT,{acceptNode(node){
        const p=node.parentElement; if(!p||['SCRIPT','STYLE','TEXTAREA','INPUT','SELECT','OPTION'].includes(p.tagName))return NodeFilter.FILTER_REJECT;
        if(!node.nodeValue.trim())return NodeFilter.FILTER_REJECT; return NodeFilter.FILTER_ACCEPT;
      }});
      const nodes=[]; while(walker.nextNode())nodes.push(walker.currentNode);
      nodes.forEach(n=>{const original=n.nodeValue; const lead=original.match(/^\s*/)[0], trail=original.match(/\s*$/)[0]; const out=translateText(original); if(out!==original.trim()) n.nodeValue=lead+out+trail;});
      const html=document.documentElement; html.lang=lang==='ja'?'ja':lang;
    }finally{busy=false;}
  }
  function addSelector(){
    let box=document.getElementById('vidal-lang-box');
    if(!box){
      box=document.createElement('div'); box.id='vidal-lang-box';
      box.innerHTML='<span aria-hidden="true" style="font-size:16px;line-height:1">🌐</span><select id="vidal-lang-select" aria-label="Idioma" style="appearance:auto;background:transparent;color:white;border:0;outline:0;font:700 13px system-ui;max-width:76px"><option value="es">ES</option><option value="en">EN</option><option value="ja">日本語</option></select>';
      const sel=box.querySelector('select'); sel.value=lang; sel.addEventListener('change',()=>{lang=sel.value;localStorage.setItem('vidal-lang',lang);walk(document.body);});
    }
    const mobileMenuBtn=document.querySelector('header button[class*="md:hidden"]');
    const headerRow=mobileMenuBtn&&mobileMenuBtn.parentElement;
    box.style.cssText='z-index:60;height:36px;min-width:64px;background:rgba(15,23,42,.48);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.10);border-radius:999px;padding:0 10px;box-shadow:0 10px 30px rgba(0,0,0,.22);display:flex;align-items:center;justify-content:center;gap:6px;color:white;font:700 13px system-ui;line-height:1';
    if(headerRow&&mobileMenuBtn){
      box.style.position='relative'; box.style.right='auto'; box.style.bottom='auto'; box.style.top='auto'; box.style.marginLeft='8px';
      if(box.parentElement!==headerRow) mobileMenuBtn.insertAdjacentElement('afterend',box);
    }else{
      box.style.position='fixed'; box.style.right='14px'; box.style.top='22px'; box.style.bottom='auto';
      if(box.parentElement!==document.body) document.body.appendChild(box);
    }
    moveThemeToggle();
  }
  function moveThemeToggle(){
    const mobileMenuBtn=document.querySelector('header button[class*="md:hidden"]');
    const headerRow=mobileMenuBtn&&mobileMenuBtn.parentElement;
    const source=Array.from(document.querySelectorAll('#hero > div')).find(el=>String(el.className).includes('top-5')&&String(el.className).includes('right-10'));
    const wrap=document.getElementById('vidal-theme-toggle-box')||(source&&source.querySelector('.button-wrap'));
    if(!headerRow||!wrap)return;
    wrap.id='vidal-theme-toggle-box';
    wrap.style.position='relative'; wrap.style.zIndex='60'; wrap.style.marginLeft='8px'; wrap.style.display='flex'; wrap.style.alignItems='center';
    const lang=document.getElementById('vidal-lang-box');
    if(lang&&lang.parentElement===headerRow){
      if(wrap.parentElement!==headerRow||lang.nextElementSibling!==wrap) lang.insertAdjacentElement('afterend',wrap);
    }else if(mobileMenuBtn){
      if(wrap.parentElement!==headerRow) mobileMenuBtn.insertAdjacentElement('afterend',wrap);
    }
  }
  function boot(){addSelector(); walk(document.body);}
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot); else boot();
  window.addEventListener('load',()=>setTimeout(boot,200));
  let t; new MutationObserver(()=>{clearTimeout(t); t=setTimeout(()=>{addSelector();walk(document.body)},120)}).observe(document.documentElement,{childList:true,subtree:true});
})();
